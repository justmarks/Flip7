name: Android APK Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: npm run sync:android

      - name: Remove flatDir from generated Capacitor plugin build file
        run: |
          FILE="Android/capacitor-cordova-android-plugins/build.gradle"
          if [ -f "$FILE" ]; then
            sed -i '/flatDir[[:space:]]*{/,/}/d' "$FILE"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x Android/gradlew

      - name: Get app version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: Android

      - name: Copy APK to workspace root
        run: cp "Android/app/build/outputs/apk/debug/Flip7ScoreTracker-v${{ steps.version.outputs.version }}.apk" "flip7-v${{ steps.version.outputs.version }}-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flip7-v${{ steps.version.outputs.version }}-debug
          path: flip7-v${{ steps.version.outputs.version }}-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK to Google Drive
        run: |
          pip install google-api-python-client google-auth --quiet
          python3 << 'EOF'
          import os
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          version = os.environ['APP_VERSION']
          apk_filename = f'flip7-v{version}-debug.apk'
          drive_name = f'Flip7ScoreTracker-v{version}.apk'

          creds = Credentials(
              token=None,
              refresh_token=os.environ['GDRIVE_REFRESH_TOKEN'],
              client_id=os.environ['GDRIVE_CLIENT_ID'],
              client_secret=os.environ['GDRIVE_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token',
              scopes=['https://www.googleapis.com/auth/drive.file']
          )
          service = build('drive', 'v3', credentials=creds)

          file_metadata = {
              'name': drive_name,
              'parents': ['1GJIeUSxSb4OhMkDGc-t3p1Hf39Jr8aiq']
          }
          media = MediaFileUpload(
              apk_filename,
              mimetype='application/vnd.android.package-archive'
          )
          result = service.files().create(
              body=file_metadata,
              media_body=media,
              fields='id,name'
          ).execute()
          print(f"Uploaded {result['name']} to Google Drive (id: {result['id']})")
          EOF
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
