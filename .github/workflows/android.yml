name: Android APK Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: npm run sync:android

      - name: Remove flatDir from generated Capacitor plugin build file
        run: |
          FILE="Android/capacitor-cordova-android-plugins/build.gradle"
          if [ -f "$FILE" ]; then
            sed -i '/flatDir[[:space:]]*{/,/}/d' "$FILE"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x Android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: Android

      - name: Copy APK to workspace root
        run: cp Android/app/build/outputs/apk/debug/Flip7ScoreTracker.apk flip7-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flip7-debug-${{ github.run_number }}
          path: flip7-debug.apk
          if-no-files-found: error
          retention-days: 30
